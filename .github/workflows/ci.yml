name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build:pages
        env:
          NEXT_PUBLIC_BASE_PATH: /typewise
          NEXT_PUBLIC_SITE_URL: https://nuthanm.github.io/typewise
          NEXT_PUBLIC_SUBMIT_API_URL: ${{ vars.SUBMIT_API_URL }}
      - run: npm run lint
